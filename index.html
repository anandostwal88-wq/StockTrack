<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="StockTrack">
<title>StockTrack</title>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMxY_V0WWp7fcE3ma7vzkC4goFNwZMGaZ2hvOj7t1MeE8FzjIxkvWW4B2TBBVh8TQ/exec";
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#f5f4f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a18}
.screen{display:none;padding:1rem;max-width:440px;margin:0 auto;padding-bottom:2rem}
.screen.active{display:block}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding:0.75rem 1rem;background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px}
.topbar-title{font-size:15px;font-weight:600;color:#1a1a18}
.topbar-sub{font-size:11px;color:#73726c;margin-top:2px}
.section-label{font-size:11px;font-weight:600;color:#73726c;text-transform:uppercase;letter-spacing:0.05em;margin:14px 0 8px;padding-bottom:4px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.metric{background:#f5f4f0;border-radius:10px;padding:0.75rem}
.metric-label{font-size:11px;color:#73726c;margin-bottom:4px}
.metric-value{font-size:22px;font-weight:600}
.form-group{margin-bottom:10px}
label{font-size:12px;color:#73726c;display:block;margin-bottom:4px}
input,select{width:100%;padding:10px 12px;border:0.5px solid rgba(0,0,0,0.15);border-radius:10px;background:#f5f4f0;color:#1a1a18;font-size:15px;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:#185FA5;background:#fff}
input[readonly]{background:#eeede8;color:#73726c;font-size:13px}
.btn{width:100%;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;margin-bottom:8px;transition:opacity 0.15s}
.btn:active{opacity:0.8}
.btn.primary{background:#185FA5;color:#fff}
.btn.success{background:#1D9E75;color:#fff}
.btn.danger-btn{background:#E24B4A;color:#fff}
.btn.gray{background:#e8e7e2;color:#3d3d3a}
.btn.warn{background:#BA7517;color:#fff}
.btn.sm{width:auto;padding:6px 12px;font-size:13px;margin-bottom:0;font-weight:500;border-radius:8px}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge.in{background:#EAF3DE;color:#27500A}
.badge.out{background:#FCEBEB;color:#791F1F}
.txn-row{padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.txn-row:last-child{border-bottom:none}
.txn-top{display:flex;align-items:center;justify-content:space-between}
.txn-detail{font-size:12px;color:#73726c;margin-top:2px}
.edit-row{display:flex;gap:6px;margin-top:8px;align-items:center}
.edit-row input{padding:6px 10px;font-size:13px;width:90px}
.stock-line{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);font-size:14px}
.stock-line:last-child{border-bottom:none}
.stock-line input{width:90px;padding:6px 10px;font-size:13px}
.pin-dots{display:flex;gap:12px;justify-content:center;margin:1.5rem 0 0.5rem}
.dot-pin{width:16px;height:16px;border-radius:50%;border:2px solid rgba(0,0,0,0.2);background:transparent;transition:background 0.15s,border-color 0.15s}
.dot-pin.filled{background:#185FA5;border-color:#185FA5}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:1rem}
.num-btn{padding:16px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);background:#fff;font-size:20px;font-weight:500;cursor:pointer;color:#1a1a18;font-family:inherit;transition:background 0.1s}
.num-btn:active{background:#e8e7e2}
.godown-card{padding:1rem;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:#fff;transition:background 0.15s}
.godown-card:active{background:#f5f4f0}
.pill{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.pill.sk{background:#E6F1FB;color:#0C447C}
.owner-tab{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tab-btn{padding:7px 13px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.12);background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:#73726c;font-family:inherit;transition:all 0.15s}
.tab-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.disc-row{padding:8px 12px;border-radius:10px;margin-bottom:6px;font-size:13px;font-weight:500}
.disc-ok{background:#EAF3DE;color:#27500A}
.disc-warn{background:#FCEBEB;color:#791F1F}
.empty{text-align:center;padding:2rem;color:#73726c;font-size:13px}
.sync-bar{display:flex;align-items:center;gap:6px;font-size:12px;padding:8px 12px;border-radius:10px;margin-bottom:1rem}
.sync-bar.ok{background:#EAF3DE;color:#27500A}
.sync-bar.pending{background:#FAEEDA;color:#633806}
.sync-bar.error{background:#FCEBEB;color:#791F1F}
.dot-status{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:#1D9E75}
.dot-amber{background:#BA7517}
.dot-red{background:#E24B4A}
</style>
</head>
<body>
<div id="s-login" class="screen active">
  <div style="text-align:center;padding:2rem 0 1.5rem">
    <div style="font-size:48px;margin-bottom:8px">🏭</div>
    <div style="font-size:24px;font-weight:700;color:#1a1a18">StockTrack</div>
    <div style="font-size:13px;color:#73726c;margin-top:4px">Select your godown</div>
  </div>
  <div id="godown-list"></div>
  <div style="text-align:center;margin-top:1rem">
    <span style="font-size:13px;color:#73726c">Are you the owner? </span>
    <button class="btn sm primary" style="display:inline-flex;margin-top:8px" onclick="startOwnerLogin()">Owner login</button>
  </div>
</div>
<div id="s-pin" class="screen">
  <div style="text-align:center;padding:1.5rem 0 0.5rem">
    <div style="font-size:17px;font-weight:600;color:#1a1a18" id="pin-title">Enter PIN</div>
    <div style="font-size:13px;color:#73726c;margin-top:4px" id="pin-sub"></div>
  </div>
  <div class="pin-dots" id="pin-dots">
    <div class="dot-pin" id="pd0"></div><div class="dot-pin" id="pd1"></div>
    <div class="dot-pin" id="pd2"></div><div class="dot-pin" id="pd3"></div>
  </div>
  <div id="pin-error" style="text-align:center;font-size:13px;color:#E24B4A;min-height:20px;margin-top:6px"></div>
  <div class="numpad">
    <button class="num-btn" onclick="pinKey('1')">1</button><button class="num-btn" onclick="pinKey('2')">2</button><button class="num-btn" onclick="pinKey('3')">3</button>
    <button class="num-btn" onclick="pinKey('4')">4</button><button class="num-btn" onclick="pinKey('5')">5</button><button class="num-btn" onclick="pinKey('6')">6</button>
    <button class="num-btn" onclick="pinKey('7')">7</button><button class="num-btn" onclick="pinKey('8')">8</button><button class="num-btn" onclick="pinKey('9')">9</button>
    <button class="num-btn" onclick="pinKey('back')" style="font-size:16px">⌫</button>
    <button class="num-btn" onclick="pinKey('0')">0</button>
    <button class="num-btn gray" onclick="goScreen('s-login')" style="font-size:13px;font-weight:500">Back</button>
  </div>
</div>
<div id="s-storekeeper" class="screen">
  <div class="topbar">
    <div><div class="topbar-title" id="sk-godown-name"></div><div class="topbar-sub" id="sk-date"></div></div>
    <button class="btn sm gray" onclick="logout()">Logout</button>
  </div>
  <div id="sync-status" class="sync-bar pending">
    <div class="dot-status dot-amber"></div>
    <span id="sync-text">Not synced to Google Sheets yet</span>
  </div>
  <div class="card">
    <div class="section-label">🌅 Morning — Opening stock</div>
    <div id="sk-opening-items"></div>
    <button class="btn success" id="btn-save-open" onclick="saveOpening()" style="margin-top:12px">✓ Save opening stock</button>
    <div id="open-saved-msg" style="font-size:13px;color:#1D9E75;margin-top:6px;display:none">✓ Opening stock saved and synced</div>
  </div>
  <div class="card">
    <div class="section-label">↕ Add transaction</div>
    <div class="form-group"><label>Transaction type</label>
      <select id="txn-type"><option value="in">Goods Inward</option><option value="out">Goods Outward</option></select>
    </div>
    <div class="form-group"><label>Bill number</label><input type="text" id="txn-bill" placeholder="e.g. INV-2024-001" autocomplete="off"></div>
    <div class="form-group"><label>Item (select existing)</label><select id="txn-item"></select></div>
    <div class="form-group"><label>Or type a new item name</label><input type="text" id="txn-new-item" placeholder="Leave blank to use selection above" autocomplete="off"></div>
    <div class="form-group"><label>Quantity</label><input type="number" id="txn-qty" min="1" placeholder="0" inputmode="numeric"></div>
    <div class="form-group"><label>Supplier / Customer name</label><input type="text" id="txn-party" placeholder="Name" autocomplete="off"></div>
    <div class="form-group"><label>Date & time — auto recorded, cannot be changed</label><input type="text" id="txn-datetime" readonly></div>
    <button class="btn primary" onclick="addTxn()">+ Add transaction</button>
  </div>
  <div class="card">
    <div class="section-label">📋 Today's transactions</div>
    <div id="sk-txn-list"><div class="empty">No transactions yet today</div></div>
  </div>
  <div class="card">
    <div class="section-label">🌙 Evening — Closing stock</div>
    <div id="sk-closing-items"></div>
    <button class="btn danger-btn" id="btn-save-close" onclick="saveClosing()" style="margin-top:12px">✓ Save closing stock</button>
    <div id="close-saved-msg" style="font-size:13px;color:#1D9E75;margin-top:6px;display:none">✓ Closing stock saved and synced</div>
  </div>
</div>
<div id="s-owner" class="screen">
  <div class="topbar">
    <div><div class="topbar-title">Owner dashboard</div><div class="topbar-sub" id="owner-date"></div></div>
    <button class="btn sm gray" onclick="logout()">Logout</button>
  </div>
  <div class="owner-tab">
    <button class="tab-btn active" onclick="ownerTab('summary')" id="ot-summary">Summary</button>
    <button class="tab-btn" onclick="ownerTab('txns')" id="ot-txns">Transactions</button>
    <button class="tab-btn" onclick="ownerTab('disc')" id="ot-disc">Discrepancies</button>
    <button class="tab-btn" onclick="ownerTab('adjust')" id="ot-adjust">Adjust</button>
  </div>
  <div id="owner-summary"></div>
  <div id="owner-txns" style="display:none"></div>
  <div id="owner-disc" style="display:none"></div>
  <div id="owner-adjust" style="display:none"></div>
</div>
<script>
const APPS_SCRIPT_URL_INLINE = typeof APPS_SCRIPT_URL !== 'undefined' ? APPS_SCRIPT_URL : 'YOUR_APPS_SCRIPT_URL_HERE';
const GODOWNS=[
  {id:'g1',name:'Godown A — Main Warehouse',pin:'1234',items:['Cement Bags','Steel Rods','PVC Pipes','Plywood Sheets'],txns:[],opening:{},closing:{}},
  {id:'g2',name:'Godown B — North Store',pin:'5678',items:['Sand (tons)','Bricks','Paint (ltr)','Tiles (sqft)'],txns:[],opening:{},closing:{}},
  {id:'g3',name:'Godown C — East Depot',pin:'9012',items:['Wires (mtr)','Switches','Bolts (kg)'],txns:[],opening:{},closing:{}}
];
const OWNER_PIN='0000';
let state={godown:null,role:null,pinBuffer:'',pinTarget:null};
function goScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function nowString(){return new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});}
function todayStr(){return new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function todayISO(){return new Date().toISOString().slice(0,10);}
function renderGodownList(){document.getElementById('godown-list').innerHTML=GODOWNS.map(g=>`<div class="godown-card" onclick="selectGodown('${g.id}')"><div><div style="font-size:15px;font-weight:600">${g.name}</div><div style="font-size:12px;color:#73726c;margin-top:3px">${g.items.length} items tracked</div></div><span class="pill sk">Storekeeper</span></div>`).join('');}
function selectGodown(id){state.godown=GODOWNS.find(g=>g.id===id);state.pinBuffer='';state.pinTarget='storekeeper';document.getElementById('pin-title').textContent=state.godown.name.split('—')[0].trim();document.getElementById('pin-sub').textContent='Enter your 4-digit PIN';updatePinDots();document.getElementById('pin-error').textContent='';goScreen('s-pin');}
function startOwnerLogin(){state.pinBuffer='';state.pinTarget='owner';document.getElementById('pin-title').textContent='Owner login';document.getElementById('pin-sub').textContent='Enter your 4-digit owner PIN';updatePinDots();document.getElementById('pin-error').textContent='';goScreen('s-pin');}
function pinKey(k){document.getElementById('pin-error').textContent='';if(k==='back'){state.pinBuffer=state.pinBuffer.slice(0,-1);}else if(state.pinBuffer.length<4){state.pinBuffer+=k;}updatePinDots();if(state.pinBuffer.length===4){setTimeout(()=>{if(state.pinTarget==='owner'){if(state.pinBuffer===OWNER_PIN){initOwner();}else{document.getElementById('pin-error').textContent='Incorrect PIN. Try again.';state.pinBuffer='';updatePinDots();}}else{if(state.pinBuffer===state.godown.pin){initStorekeeper();}else{document.getElementById('pin-error').textContent='Incorrect PIN. Try again.';state.pinBuffer='';updatePinDots();}}},120);}}
function updatePinDots(){for(let i=0;i<4;i++){document.getElementById('pd'+i).classList.toggle('filled',i<state.pinBuffer.length);}}
function sid(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}
function initStorekeeper(){const g=state.godown;document.getElementById('sk-godown-name').textContent=g.name;document.getElementById('sk-date').textContent=todayStr();document.getElementById('txn-datetime').value=nowString();renderSKOpening();renderSKClosing();renderSKItemDropdown();renderSKTxns();setSyncStatus('pending','Ready — transactions will sync on save');goScreen('s-storekeeper');}
function renderSKOpening(){const g=state.godown;document.getElementById('sk-opening-items').innerHTML=g.items.map(item=>`<div class="stock-line"><span>${item}</span><input type="number" min="0" placeholder="qty" inputmode="numeric" id="open-${sid(item)}" value="${g.opening[item]!==undefined?g.opening[item]:''}"></div>`).join('');}
function renderSKClosing(){const g=state.godown;document.getElementById('sk-closing-items').innerHTML=g.items.map(item=>`<div class="stock-line"><span>${item}</span><input type="number" min="0" placeholder="qty" inputmode="numeric" id="close-${sid(item)}" value="${g.closing[item]!==undefined?g.closing[item]:''}"></div>`).join('');}
function renderSKItemDropdown(){document.getElementById('txn-item').innerHTML=state.godown.items.map(i=>`<option>${i}</option>`).join('');}
function saveOpening(){const g=state.godown;const items=[];g.items.forEach(item=>{const el=document.getElementById('open-'+sid(item));const qty=el&&el.value!==''?parseInt(el.value)||0:0;g.opening[item]=qty;items.push({name:item,qty});});document.getElementById('btn-save-open').disabled=true;setSyncStatus('pending','Syncing opening stock to Google Sheets...');syncToSheets({type:'opening',godown:g.name,date:todayISO(),items}).then(()=>{document.getElementById('open-saved-msg').style.display='block';setSyncStatus('ok','Opening stock synced ✓');}).catch(()=>setSyncStatus('error','Sync failed — check internet connection'));}
function addTxn(){const g=state.godown;const type=document.getElementById('txn-type').value;const bill=document.getElementById('txn-bill').value.trim();const newItem=document.getElementById('txn-new-item').value.trim();const item=newItem||document.getElementById('txn-item').value;const qty=parseInt(document.getElementById('txn-qty').value)||0;const party=document.getElementById('txn-party').value.trim();const datetime=nowString();if(!bill){alert('Please enter a bill number');return;}if(!item){alert('Please select or type an item name');return;}if(qty<=0){alert('Please enter a valid quantity');return;}if(newItem&&!g.items.includes(newItem)){g.items.push(newItem);renderSKItemDropdown();renderSKOpening();renderSKClosing();}const txn={id:Date.now(),type,bill,item,qty,party,datetime,edited:false};g.txns.push(txn);document.getElementById('txn-bill').value='';document.getElementById('txn-qty').value='';document.getElementById('txn-party').value='';document.getElementById('txn-new-item').value='';document.getElementById('txn-datetime').value=nowString();renderSKTxns();setSyncStatus('pending','Syncing transaction...');syncToSheets({type:'transaction',godown:g.name,date:todayISO(),txn}).then(()=>setSyncStatus('ok','Last transaction synced ✓ at '+nowString())).catch(()=>setSyncStatus('error','Sync failed — check internet connection'));}
function renderSKTxns(){const g=state.godown;const el=document.getElementById('sk-txn-list');if(!g.txns.length){el.innerHTML='<div class="empty">No transactions yet today</div>';return;}el.innerHTML=[...g.txns].reverse().map(t=>`<div class="txn-row"><div class="txn-top"><div style="display:flex;align-items:center;gap:6px"><span class="badge ${t.type}">${t.type==='in'?'Inward':'Outward'}</span><span style="font-size:14px;font-weight:600">${t.item}</span>${t.edited?'<span style="font-size:10px;color:#BA7517;font-weight:600">(edited)</span>':''}</div><span style="font-size:15px;font-weight:700">×${t.qty}</span></div><div class="txn-detail">${t.bill} · ${t.party||'—'}</div><div class="txn-detail" style="color:#aaa;margin-top:1px">${t.datetime}</div><div class="edit-row"><input type="number" placeholder="New qty" id="eq-${t.id}" inputmode="numeric"><button class="btn sm gray" onclick="editTxn(${t.id})">✎ Edit</button><button class="btn sm danger-btn" onclick="deleteTxn(${t.id})">🗑</button></div></div>`).join('');}
function editTxn(id){const g=state.godown;const t=g.txns.find(x=>x.id===id);const newQty=parseInt(document.getElementById('eq-'+id).value);if(!newQty||newQty<=0){alert('Enter a valid new quantity');return;}t.qty=newQty;t.edited=true;t.datetime=nowString();renderSKTxns();setSyncStatus('pending','Syncing edit...');syncToSheets({type:'transaction',godown:g.name,date:todayISO(),txn:t}).then(()=>setSyncStatus('ok','Edit synced ✓')).catch(()=>setSyncStatus('error','Sync failed'));}
function deleteTxn(id){if(!confirm('Delete this transaction?'))return;const g=state.godown;g.txns=g.txns.filter(x=>x.id!==id);renderSKTxns();}
function saveClosing(){const g=state.godown;const items=[];g.items.forEach(item=>{const el=document.getElementById('close-'+sid(item));const qty=el&&el.value!==''?parseInt(el.value)||0:0;g.closing[item]=qty;items.push({name:item,qty});});const summary=g.items.map(item=>{const opening=g.opening[item]||0;const inward=g.txns.filter(t=>t.item===item&&t.type==='in').reduce((s,t)=>s+t.qty,0);const outward=g.txns.filter(t=>t.item===item&&t.type==='out').reduce((s,t)=>s+t.qty,0);const expected=opening+inward-outward;const actual=g.closing[item]||0;return{item,opening,inward,outward,expected,actual,diff:actual-expected};});document.getElementById('btn-save-close').disabled=true;setSyncStatus('pending','Syncing closing stock...');syncToSheets({type:'closing',godown:g.name,date:todayISO(),items,summary}).then(()=>{document.getElementById('close-saved-msg').style.display='block';setSyncStatus('ok','Closing stock & discrepancy report synced ✓');}).catch(()=>setSyncStatus('error','Sync failed — check internet'));}
function syncToSheets(payload){if(!APPS_SCRIPT_URL_INLINE||APPS_SCRIPT_URL_INLINE==='YOUR_APPS_SCRIPT_URL_HERE'){console.warn('Apps Script URL not set');return Promise.resolve();}return fetch(APPS_SCRIPT_URL_INLINE,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'no-cors'});}
function setSyncStatus(type,msg){const bar=document.getElementById('sync-status');const txt=document.getElementById('sync-text');const dot=bar.querySelector('.dot-status');bar.className='sync-bar '+type;txt.textContent=msg;dot.className='dot-status '+(type==='ok'?'dot-green':type==='error'?'dot-red':'dot-amber');}
function initOwner(){document.getElementById('owner-date').textContent=todayStr();ownerTab('summary');goScreen('s-owner');}
function ownerTab(tab){['summary','txns','disc','adjust'].forEach(t=>{document.getElementById('owner-'+t).style.display=t===tab?'block':'none';document.getElementById('ot-'+t).classList.toggle('active',t===tab);});if(tab==='summary')renderOwnerSummary();if(tab==='txns')renderOwnerTxns();if(tab==='disc')renderOwnerDisc();if(tab==='adjust')renderOwnerAdjust();}
function getNet(g,item){let s=g.opening[item]||0;g.txns.forEach(t=>{if(t.item===item)s+=t.type==='in'?t.qty:-t.qty;});return s;}
function renderOwnerSummary(){let html='';GODOWNS.forEach(g=>{const totalIn=g.txns.filter(t=>t.type==='in').reduce((s,t)=>s+t.qty,0);const totalOut=g.txns.filter(t=>t.type==='out').reduce((s,t)=>s+t.qty,0);html+=`<div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:12px">${g.name}</div><div class="metrics" style="margin-bottom:12px"><div class="metric"><div class="metric-label">Transactions</div><div class="metric-value">${g.txns.length}</div></div><div class="metric"><div class="metric-label">Total inward</div><div class="metric-value" style="color:#1D9E75">${totalIn}</div></div><div class="metric"><div class="metric-label">Total outward</div><div class="metric-value" style="color:#E24B4A">${totalOut}</div></div><div class="metric"><div class="metric-label">Items tracked</div><div class="metric-value">${g.items.length}</div></div></div><div class="section-label">Current stock per item</div>${g.items.map(item=>`<div class="stock-line"><span>${item}</span><span style="font-weight:600">Net: ${getNet(g,item)} <span style="font-size:11px;color:#73726c;font-weight:400">/ Closing: ${g.closing[item]!==undefined?g.closing[item]:'—'}</span></span></div>`).join('')}</div>`;});document.getElementById('owner-summary').innerHTML=html||'<div class="empty">No data yet</div>';}
function renderOwnerTxns(){let html='';GODOWNS.forEach(g=>{if(!g.txns.length)return;html+=`<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:10px">${g.name}</div>${[...g.txns].reverse().map(t=>`<div class="txn-row"><div class="txn-top"><div style="display:flex;gap:6px;align-items:center"><span class="badge ${t.type}">${t.type==='in'?'Inward':'Outward'}</span><span style="font-size:13px;font-weight:600">${t.item}</span></div><span style="font-weight:700">×${t.qty}</span></div><div class="txn-detail">${t.bill} · ${t.party||'—'}</div><div class="txn-detail" style="color:#aaa">${t.datetime}</div></div>`).join('')}</div>`;});document.getElementById('owner-txns').innerHTML=html||'<div class="empty">No transactions yet</div>';}
function renderOwnerDisc(){let html='';GODOWNS.forEach(g=>{html+=`<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:10px">${g.name}</div>`;g.items.forEach(item=>{const open=g.opening[item];const close=g.closing[item];if(open===undefined||close===undefined){html+=`<div class="disc-row" style="background:#f5f4f0;color:#73726c">${item} — data not yet complete</div>`;return;}const expected=getNet(g,item);const diff=close-expected;if(diff===0){html+=`<div class="disc-row disc-ok">✓ ${item} — Matches (${close})</div>`;}else{html+=`<div class="disc-row disc-warn">⚠ ${item} — Expected ${expected}, entered ${close} <strong>(diff: ${diff>0?'+':''}${diff})</strong></div>`;}});html+='</div>';});document.getElementById('owner-disc').innerHTML=html;}
function renderOwnerAdjust(){const opts=GODOWNS.map(g=>`<option value="${g.id}">${g.name}</option>`).join('');document.getElementById('owner-adjust').innerHTML=`<div class="card"><div class="section-label">Manual stock adjustment</div><div class="form-group"><label>Select godown</label><select id="adj-godown" onchange="updateAdjItems()">${opts}</select></div><div class="form-group"><label>Select item</label><select id="adj-item"></select></div><div class="form-group"><label>Quantity adjustment (use – to remove, + to add)</label><input type="number" id="adj-qty" placeholder="e.g. -5 or 10" inputmode="numeric"></div><div class="form-group"><label>Reason for adjustment</label><input type="text" id="adj-reason" placeholder="e.g. Damaged goods, theft, recount"></div><button class="btn warn" onclick="applyAdj()">Apply adjustment</button></div>`;updateAdjItems();}
function updateAdjItems(){const gid=document.getElementById('adj-godown').value;const g=GODOWNS.find(x=>x.id===gid);document.getElementById('adj-item').innerHTML=g.items.map(i=>`<option>${i}</option>`).join('');}
function applyAdj(){const gid=document.getElementById('adj-godown').value;const g=GODOWNS.find(x=>x.id===gid);const item=document.getElementById('adj-item').value;const qty=parseInt(document.getElementById('adj-qty').value)||0;const reason=document.getElementById('adj-reason').value.trim();if(!qty){alert('Enter a non-zero quantity');return;}if(!reason){alert('Please enter a reason');return;}const txn={id:Date.now(),type:qty>0?'in':'out',bill:'ADJ-'+Date.now().toString().slice(-5),item,qty:Math.abs(qty),party:'Owner: '+reason,datetime:nowString(),edited:false};g.txns.push(txn);syncToSheets({type:'adjustment',godown:g.name,date:todayISO(),txn}).then(()=>alert('Adjustment applied and synced to '+g.name)).catch(()=>alert('Saved locally but sync failed'));}
function logout(){state.godown=null;state.role=null;state.pinBuffer='';renderGodownList();goScreen('s-login');}
renderGodownList();
</script>
</body>
