<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Arihant Stock Track">
<title>Arihant Stock Track</title>
<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMxY_V0WWp7fcE3ma7vzkC4goFNwZMGaZ2hvOj7t1MeE8FzjIxkvWW4B2TBBVh8TQ/exec";
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#f5f4f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a18}
.screen{display:none;padding:1rem;max-width:440px;margin:0 auto;padding-bottom:3rem}
.screen.active{display:block}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding:.75rem 1rem;background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px}
.topbar-title{font-size:15px;font-weight:600}
.topbar-sub{font-size:11px;color:#73726c;margin-top:2px}
.col-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:.75rem 1.25rem;background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:14px;margin-bottom:6px;-webkit-tap-highlight-color:transparent;user-select:none}
.col-hdr.open{border-bottom-left-radius:0;border-bottom-right-radius:0;border-bottom:none;margin-bottom:0}
.col-body{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-top:none;border-bottom-left-radius:14px;border-bottom-right-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;display:none}
.col-body.open{display:block}
.sec{font-size:11px;font-weight:600;color:#73726c;text-transform:uppercase;letter-spacing:.05em;margin:12px 0 8px;padding-bottom:4px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.fg{margin-bottom:10px}
label{font-size:12px;color:#73726c;display:block;margin-bottom:4px}
input,select{width:100%;padding:10px 12px;border:0.5px solid rgba(0,0,0,0.15);border-radius:10px;background:#f5f4f0;color:#1a1a18;font-size:15px;font-family:inherit;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:#185FA5;background:#fff}
input[readonly]{background:#eeede8;color:#73726c;font-size:13px}
.btn{width:100%;padding:12px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.12);background:transparent;color:#1a1a18;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;font-family:inherit;margin-bottom:8px;-webkit-tap-highlight-color:transparent}
.btn:active{opacity:.8}
.btn.pri{background:#185FA5;color:#fff;border-color:#185FA5}
.btn.suc{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn.dan{background:#E24B4A;color:#fff;border-color:#E24B4A}
.btn.wrn{background:#BA7517;color:#fff;border-color:#BA7517}
.btn.gst{background:transparent;border-color:transparent;color:#73726c}
.btn.sm{width:auto;padding:6px 12px;font-size:12px;margin-bottom:0;border-radius:8px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge.in{background:#EAF3DE;color:#27500A}
.badge.out{background:#FCEBEB;color:#791F1F}
.gcard{padding:.9rem 1rem;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:#fff;-webkit-tap-highlight-color:transparent}
.gcard:active{background:#f5f4f0}
.pill{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:#E6F1FB;color:#0C447C}
.pin-dots{display:flex;gap:12px;justify-content:center;margin:1.5rem 0 .5rem}
.dp{width:16px;height:16px;border-radius:50%;border:2px solid rgba(0,0,0,0.2);background:transparent;transition:background .15s}
.dp.f{background:#185FA5;border-color:#185FA5}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:1rem}
.nb{padding:16px;border-radius:12px;border:0.5px solid rgba(0,0,0,0.1);background:#fff;font-size:20px;font-weight:500;cursor:pointer;color:#1a1a18;font-family:inherit;-webkit-tap-highlight-color:transparent}
.nb:active{background:#f5f4f0}
.trow{padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.trow:last-child{border-bottom:none}
.ttop{display:flex;align-items:center;justify-content:space-between}
.tdet{font-size:12px;color:#73726c;margin-top:2px}
.sline{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);font-size:13px;gap:8px}
.sline:last-child{border-bottom:none}
.sline input{width:80px;padding:5px 8px;font-size:13px}
.drow{padding:7px 10px;border-radius:10px;margin-bottom:5px;font-size:13px;font-weight:600}
.dok{background:#EAF3DE;color:#27500A}
.dwarn{background:#FCEBEB;color:#791F1F}
.dpend{background:#f5f4f0;color:#73726c}
.sbar{display:flex;align-items:center;gap:6px;font-size:12px;padding:7px 12px;border-radius:10px;margin-bottom:1rem}
.sbar.ok{background:#EAF3DE;color:#27500A}
.sbar.pend{background:#FAEEDA;color:#633806}
.sbar.err{background:#FCEBEB;color:#791F1F}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tabrow{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.tbtn{padding:7px 13px;border-radius:10px;border:0.5px solid rgba(0,0,0,0.12);background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:#73726c;font-family:inherit;-webkit-tap-highlight-color:transparent}
.tbtn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.irow{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);font-size:13px}
.irow:last-child{border-bottom:none}
.sugbox{position:relative}
.suglist{position:absolute;top:100%;left:0;right:0;background:#fff;border:0.5px solid rgba(0,0,0,0.15);border-radius:10px;z-index:99;max-height:160px;overflow-y:auto;margin-top:2px;box-shadow:0 4px 16px rgba(0,0,0,0.12)}
.sugitem{padding:10px 14px;font-size:14px;cursor:pointer;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.sugitem:last-child{border-bottom:none}
.sugitem:active{background:#f5f4f0}
.sughl{color:#185FA5;font-weight:700}
.birow{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:0.5px solid rgba(0,0,0,0.07)}
.birow:last-child{border-bottom:none}
.lowbadge{font-size:10px;padding:1px 6px;border-radius:10px;background:#FAEEDA;color:#633806;margin-left:4px;font-weight:600}
.setrow{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.07);font-size:13px}
.setrow:last-child{border-bottom:none}
.empty{text-align:center;padding:2rem;color:#73726c;font-size:13px}
.chev{transition:transform .2s;display:inline-block;font-size:16px;color:#73726c}
.chev.open{transform:rotate(180deg)}
.loading-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(245,244,240,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px}
.spinner{width:36px;height:36px;border:3px solid rgba(24,95,165,0.2);border-top-color:#185FA5;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading-overlay" class="loading-overlay">
  <div class="spinner"></div>
  <div style="font-size:13px;color:#73726c">Loading settings...</div>
</div>

<div id="s-login" class="screen">
  <div style="text-align:center;padding:2.5rem 0 1.5rem">
    <div style="font-size:50px;margin-bottom:10px">🏭</div>
    <div style="font-size:22px;font-weight:700">Arihant Stock Track</div>
    <div style="font-size:13px;color:#73726c;margin-top:5px">Select your godown</div>
  </div>
  <div id="godown-list"></div>
  <div style="text-align:center;margin-top:1.2rem">
    <button class="btn sm pri" style="display:inline-flex" onclick="startOwnerLogin()">🔐 Owner login</button>
  </div>
</div>

<div id="s-pin" class="screen">
  <div style="text-align:center;padding:1.5rem 0 .5rem">
    <div style="font-size:17px;font-weight:700" id="pin-title">Enter PIN</div>
    <div style="font-size:13px;color:#73726c;margin-top:5px" id="pin-sub"></div>
  </div>
  <div class="pin-dots">
    <div class="dp" id="pd0"></div><div class="dp" id="pd1"></div>
    <div class="dp" id="pd2"></div><div class="dp" id="pd3"></div>
  </div>
  <div id="pin-err" style="text-align:center;font-size:13px;color:#E24B4A;min-height:20px;margin-top:5px"></div>
  <div class="numpad">
    <button class="nb" onclick="pk('1')">1</button><button class="nb" onclick="pk('2')">2</button><button class="nb" onclick="pk('3')">3</button>
    <button class="nb" onclick="pk('4')">4</button><button class="nb" onclick="pk('5')">5</button><button class="nb" onclick="pk('6')">6</button>
    <button class="nb" onclick="pk('7')">7</button><button class="nb" onclick="pk('8')">8</button><button class="nb" onclick="pk('9')">9</button>
    <button class="nb" onclick="pk('back')">⌫</button>
    <button class="nb" onclick="pk('0')">0</button>
    <button class="nb" onclick="goScreen('s-login')" style="font-size:13px;color:#73726c;font-weight:500">Back</button>
  </div>
</div>

<div id="s-sk" class="screen">
  <div class="topbar">
    <div><div class="topbar-title" id="sk-name"></div><div class="topbar-sub" id="sk-date"></div></div>
    <button class="btn sm gst" onclick="logout()">Logout</button>
  </div>
  <div id="sync-bar" class="sbar pend"><div class="sdot" style="background:#BA7517"></div><span id="sync-txt">Ready</span></div>

  <div id="open-hdr" class="col-hdr" onclick="togCol('open')">
    <span style="font-size:14px;font-weight:600">🌅 Opening stock</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="open-badge" style="font-size:11px;color:#73726c">Tap to expand</span>
      <span class="chev" id="open-chev">▾</span>
    </div>
  </div>
  <div id="open-body" class="col-body">
    <div id="sk-open-items"></div>
    <button class="btn suc" id="btn-open" onclick="saveOpening()" style="margin-top:12px">✓ Save opening stock</button>
    <div id="open-saved" style="display:none;font-size:13px;color:#1D9E75;margin-top:6px">✓ Saved &nbsp;<button onclick="editOpening()" style="background:none;border:none;color:#185FA5;font-size:13px;cursor:pointer;text-decoration:underline">Edit</button></div>
  </div>

  <div class="card">
    <div class="sec">↕ New bill / transaction</div>
    <div class="fg"><label>Transaction type</label>
      <select id="txn-type"><option value="out">Goods Outward</option><option value="in">Goods Inward</option></select>
    </div>
    <div class="fg"><label>Bill number</label><input type="text" id="txn-bill" placeholder="e.g. INV-001" autocomplete="off"></div>
    <div class="fg"><label>Supplier / Customer name</label><input type="text" id="txn-party" placeholder="Name" autocomplete="off"></div>
    <div class="fg"><label>Date &amp; time <span style="font-size:10px;color:#1D9E75">(auto-recorded)</span></label><input type="text" id="txn-dt" readonly></div>
    <div class="sec">📦 Items in this bill</div>
    <div id="bill-items-list"><div style="font-size:12px;color:#73726c;padding:4px 0 8px">No items added yet</div></div>
    <div style="background:#f5f4f0;border-radius:12px;padding:.85rem;margin-top:6px">
      <div class="sugbox" style="margin-bottom:8px">
        <label>Search &amp; select item</label>
        <input type="text" id="item-search" placeholder="Type item name..." autocomplete="off" oninput="showSug()" onfocus="showSug()" onblur="setTimeout(hideSug,250)">
        <div class="suglist" id="suglist" style="display:none"></div>
      </div>
      <div style="margin-bottom:8px"><label>Quantity</label><input type="number" id="item-qty" min="1" placeholder="0" inputmode="numeric"></div>
      <button class="btn pri" onclick="addItemToBill()" style="margin-bottom:0">+ Add item to bill</button>
    </div>
    <button class="btn suc" onclick="submitBill()" style="margin-top:10px">✓ Submit bill</button>
  </div>

  <div class="card">
    <div class="sec">📋 Today's transactions</div>
    <div id="sk-txn-list"><div class="empty">No transactions yet today</div></div>
  </div>

  <div id="close-hdr" class="col-hdr" onclick="togCol('close')">
    <span style="font-size:14px;font-weight:600">🌙 Closing stock</span>
    <div style="display:flex;align-items:center;gap:8px">
      <span id="close-badge" style="font-size:11px;color:#73726c">Tap to expand</span>
      <span class="chev" id="close-chev">▾</span>
    </div>
  </div>
  <div id="close-body" class="col-body">
    <div id="sk-close-items"></div>
    <button class="btn dan" id="btn-close" onclick="saveClosing()" style="margin-top:12px">✓ Save closing stock</button>
    <div id="close-saved" style="display:none;font-size:13px;color:#1D9E75;margin-top:6px">✓ Saved &nbsp;<button onclick="editClosing()" style="background:none;border:none;color:#185FA5;font-size:13px;cursor:pointer;text-decoration:underline">Edit</button></div>
  </div>
</div>

<div id="s-owner" class="screen">
  <div class="topbar">
    <div><div class="topbar-title">Arihant Stock Track</div><div class="topbar-sub" id="owner-date"></div></div>
    <button class="btn sm gst" onclick="logout()">Logout</button>
  </div>
  <div class="tabrow">
    <button class="tbtn active" onclick="oTab('summary')" id="ot-summary">Summary</button>
    <button class="tbtn" onclick="oTab('txns')" id="ot-txns">Transactions</button>
    <button class="tbtn" onclick="oTab('disc')" id="ot-disc">Discrepancies</button>
    <button class="tbtn" onclick="oTab('adjust')" id="ot-adjust">Adjust</button>
    <button class="tbtn" onclick="oTab('settings')" id="ot-settings">⚙ Settings</button>
  </div>
  <div id="owner-summary"></div>
  <div id="owner-txns" style="display:none"></div>
  <div id="owner-disc" style="display:none"></div>
  <div id="owner-adjust" style="display:none"></div>
  <div id="owner-settings" style="display:none"></div>
</div>

<script>
var SURL = typeof APPS_SCRIPT_URL !== 'undefined' ? APPS_SCRIPT_URL : '';

// ── DEFAULT SETTINGS (used only if no saved settings found in Sheets) ────────
var DEFAULT_SETTINGS = {
  ownerPin: '0000',
  godowns: [
    {id:'g1',name:'Godown A',pin:'1234',items:[{name:'Cement Bags',lowAlert:50},{name:'Steel Rods',lowAlert:20},{name:'PVC Pipes',lowAlert:30},{name:'Plywood Sheets',lowAlert:10}]},
    {id:'g2',name:'Godown B',pin:'5678',items:[{name:'Sand (tons)',lowAlert:10},{name:'Bricks',lowAlert:500},{name:'Paint (ltr)',lowAlert:20},{name:'Tiles (sqft)',lowAlert:100}]},
    {id:'g3',name:'Godown C',pin:'9012',items:[{name:'Wires (mtr)',lowAlert:50},{name:'Switches',lowAlert:20},{name:'Bolts (kg)',lowAlert:15}]}
  ]
};

// ── RUNTIME DB (settings + today's session data) ─────────────────────────────
var DB = {
  ownerPin: DEFAULT_SETTINGS.ownerPin,
  godowns: DEFAULT_SETTINGS.godowns.map(function(g){
    return {id:g.id,name:g.name,pin:g.pin,items:JSON.parse(JSON.stringify(g.items)),txns:[],opening:{},closing:{},openSaved:false,closeSaved:false};
  })
};

var S = {godown:null,role:null,pin:'',pinTarget:null,billItems:[]};

// ── LOAD SETTINGS FROM GOOGLE SHEETS ON STARTUP ──────────────────────────────
function loadSettingsFromSheets() {
  if (!SURL) { hideLoading(); goScreen('s-login'); renderGodownList(); return; }
  fetch(SURL + '?action=loadSettings', {method:'GET', mode:'no-cors'})
    .then(function() {
      // no-cors means we can't read response — fall back to POST
      return fetch(SURL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'loadSettings'}), mode:'cors'});
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data && data.status === 'ok' && data.settings) {
        applySettings(data.settings);
      }
      hideLoading(); goScreen('s-login'); renderGodownList();
    })
    .catch(function(){
      // If load fails (CORS/network), just use defaults — app still works
      hideLoading(); goScreen('s-login'); renderGodownList();
    });
}

function applySettings(settings) {
  if (!settings) return;
  if (settings.ownerPin) DB.ownerPin = settings.ownerPin;
  if (settings.godowns) {
    settings.godowns.forEach(function(sg) {
      var existing = DB.godowns.find(function(g){ return g.id === sg.id; });
      if (existing) {
        existing.name = sg.name;
        existing.pin = sg.pin;
        existing.items = sg.items;
      } else {
        DB.godowns.push({id:sg.id,name:sg.name,pin:sg.pin,items:sg.items,txns:[],opening:{},closing:{},openSaved:false,closeSaved:false});
      }
    });
  }
}

function saveSettingsToSheets() {
  if (!SURL) return Promise.resolve();
  var settings = {
    ownerPin: DB.ownerPin,
    godowns: DB.godowns.map(function(g){ return {id:g.id,name:g.name,pin:g.pin,items:g.items}; })
  };
  return fetch(SURL, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({type:'saveSettings',settings:settings}), mode:'no-cors'});
}

function hideLoading() { document.getElementById('loading-overlay').style.display = 'none'; }

// ── SCREEN / UI HELPERS ──────────────────────────────────────────────────────
function goScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function nowStr(){return new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true});}
function todayStr(){return new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}
function todayISO(){return new Date().toISOString().slice(0,10);}
function sid(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}

function setSyncBar(type,msg){
  var bar=document.getElementById('sync-bar');var dot=bar.querySelector('.sdot');
  bar.className='sbar '+type;
  document.getElementById('sync-txt').textContent=msg;
  dot.style.background=type==='ok'?'#1D9E75':type==='err'?'#E24B4A':'#BA7517';
}

function sync(payload){
  if(!SURL)return Promise.resolve();
  return fetch(SURL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),mode:'no-cors'});
}

// ── GODOWN LIST ───────────────────────────────────────────────────────────────
function renderGodownList(){
  document.getElementById('godown-list').innerHTML=DB.godowns.map(function(g){
    return '<div class="gcard" onclick="selGodown(\''+g.id+'\')"><div><div style="font-size:15px;font-weight:600">'+g.name+'</div><div style="font-size:12px;color:#73726c;margin-top:3px">'+g.items.length+' items</div></div><span class="pill">Storekeeper</span></div>';
  }).join('');
}

// ── PIN LOGIC ─────────────────────────────────────────────────────────────────
function selGodown(id){S.godown=DB.godowns.find(function(g){return g.id===id;});S.pin='';S.pinTarget='sk';document.getElementById('pin-title').textContent=S.godown.name;document.getElementById('pin-sub').textContent='Enter your 4-digit PIN';document.getElementById('pin-err').textContent='';updDots();goScreen('s-pin');}
function startOwnerLogin(){S.pin='';S.pinTarget='owner';document.getElementById('pin-title').textContent='Owner login';document.getElementById('pin-sub').textContent='Enter your 4-digit owner PIN';document.getElementById('pin-err').textContent='';updDots();goScreen('s-pin');}
function pk(k){document.getElementById('pin-err').textContent='';if(k==='back')S.pin=S.pin.slice(0,-1);else if(S.pin.length<4)S.pin+=k;updDots();if(S.pin.length===4){setTimeout(function(){if(S.pinTarget==='owner'){if(S.pin===DB.ownerPin)initOwner();else{document.getElementById('pin-err').textContent='Incorrect PIN. Try again.';S.pin='';updDots();}}else{if(S.pin===S.godown.pin)initSK();else{document.getElementById('pin-err').textContent='Incorrect PIN. Try again.';S.pin='';updDots();}}},120);}}
function updDots(){for(var i=0;i<4;i++)document.getElementById('pd'+i).classList.toggle('f',i<S.pin.length);}

// ── COLLAPSIBLE ───────────────────────────────────────────────────────────────
function togCol(w){var body=document.getElementById(w+'-body');var hdr=document.getElementById(w+'-hdr');var chev=document.getElementById(w+'-chev');var badge=document.getElementById(w+'-badge');var open=body.classList.contains('open');body.classList.toggle('open',!open);hdr.classList.toggle('open',!open);chev.classList.toggle('open',!open);badge.textContent=open?'Tap to expand':'Tap to collapse';}

// ── STOREKEEPER ───────────────────────────────────────────────────────────────
function initSK(){var g=S.godown;S.billItems=[];document.getElementById('sk-name').textContent=g.name;document.getElementById('sk-date').textContent=todayStr();document.getElementById('txn-dt').value=nowStr();document.getElementById('open-badge').textContent=g.openSaved?'Saved ✓':'Tap to expand';document.getElementById('close-badge').textContent=g.closeSaved?'Saved ✓':'Tap to expand';renderSKOpen();renderSKClose();renderSKTxns();renderBillItems();setSyncBar('pend','Ready');goScreen('s-sk');}

function renderSKOpen(){var g=S.godown;var lk=g.openSaved;document.getElementById('sk-open-items').innerHTML=g.items.map(function(item){return'<div class="sline"><span style="flex:1">'+item.name+'</span><input type="number" min="0" placeholder="qty" inputmode="numeric" id="open-'+sid(item.name)+'" value="'+(g.opening[item.name]!==undefined?g.opening[item.name]:'')+'" '+(lk?'readonly':'')+' style="background:'+(lk?'#eeede8':'#f5f4f0')+'"></div>';}).join('');document.getElementById('btn-open').style.display=lk?'none':'flex';document.getElementById('open-saved').style.display=lk?'block':'none';document.getElementById('open-badge').textContent=lk?'Saved ✓':'Tap to expand';}
function renderSKClose(){var g=S.godown;var lk=g.closeSaved;document.getElementById('sk-close-items').innerHTML=g.items.map(function(item){var net=getNet(g,item.name);var low=item.lowAlert&&net<=item.lowAlert;return'<div class="sline" style="'+(low?'background:#FAEEDA;border-radius:10px;padding:6px 8px;':'')+'"><span style="flex:1;'+(low?'color:#633806;':'')+'">'+item.name+(low?'<span class="lowbadge">⚠ Low</span>':'')+'</span><input type="number" min="0" placeholder="qty" inputmode="numeric" id="close-'+sid(item.name)+'" value="'+(g.closing[item.name]!==undefined?g.closing[item.name]:'')+'" '+(lk?'readonly':'')+' style="background:'+(lk?'#eeede8':'#f5f4f0')+'"></div>';}).join('');document.getElementById('btn-close').style.display=lk?'none':'flex';document.getElementById('close-saved').style.display=lk?'block':'none';document.getElementById('close-badge').textContent=lk?'Saved ✓':'Tap to expand';}
function editOpening(){S.godown.openSaved=false;renderSKOpen();}
function editClosing(){S.godown.closeSaved=false;renderSKClose();}

function saveOpening(){var g=S.godown;var items=[];g.items.forEach(function(item){var el=document.getElementById('open-'+sid(item.name));var qty=el&&el.value!==''?parseInt(el.value)||0:0;g.opening[item.name]=qty;items.push({name:item.name,qty:qty});});g.openSaved=true;renderSKOpen();setSyncBar('pend','Syncing...');sync({type:'opening',godown:g.name,date:todayISO(),items:items}).then(function(){setSyncBar('ok','Opening stock synced ✓');}).catch(function(){setSyncBar('err','Sync failed');});}
function saveClosing(){var g=S.godown;var items=[];g.items.forEach(function(item){var el=document.getElementById('close-'+sid(item.name));var qty=el&&el.value!==''?parseInt(el.value)||0:0;g.closing[item.name]=qty;items.push({name:item.name,qty:qty});});var summary=buildSummary(g);g.closeSaved=true;renderSKClose();setSyncBar('pend','Syncing...');sync({type:'closing',godown:g.name,date:todayISO(),items:items,summary:summary}).then(function(){setSyncBar('ok','Closing stock synced ✓');}).catch(function(){setSyncBar('err','Sync failed');});}

// ── ITEM SEARCH / SUGGESTIONS ─────────────────────────────────────────────────
function showSug(){var q=document.getElementById('item-search').value.toLowerCase().trim();var box=document.getElementById('suglist');var items=S.godown?S.godown.items:[];var filtered=q?items.filter(function(i){return i.name.toLowerCase().indexOf(q)!==-1;}):items;if(!filtered.length){box.style.display='none';return;}box.innerHTML=filtered.map(function(i){var hl=q?i.name.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="sughl">$1</span>'):i.name;return'<div class="sugitem" onmousedown="selItem(\''+i.name+'\')">'+hl+'</div>';}).join('');box.style.display='block';}
function hideSug(){document.getElementById('suglist').style.display='none';}
function selItem(name){document.getElementById('item-search').value=name;hideSug();}

// ── MULTI-ITEM BILL ───────────────────────────────────────────────────────────
function renderBillItems(){var el=document.getElementById('bill-items-list');if(!S.billItems.length){el.innerHTML='<div style="font-size:12px;color:#73726c;padding:4px 0 8px">No items added yet</div>';return;}el.innerHTML=S.billItems.map(function(bi,idx){return'<div class="birow"><span style="flex:1;font-size:14px;font-weight:500">'+bi.name+'</span><span style="font-size:14px;font-weight:600;min-width:40px;text-align:right">×'+bi.qty+'</span><button class="btn sm dan" onclick="remBillItem('+idx+')" style="margin-left:8px">✕</button></div>';}).join('');}
function addItemToBill(){var name=document.getElementById('item-search').value.trim();var qty=parseInt(document.getElementById('item-qty').value)||0;if(!name){alert('Type or select an item name');return;}if(qty<=0){alert('Enter a valid quantity');return;}var g=S.godown;if(!g.items.find(function(i){return i.name===name;})){if(confirm('"'+name+'" is not in your list. Add it?')){g.items.push({name:name,lowAlert:0});}else return;}var ex=S.billItems.find(function(b){return b.name===name;});if(ex){ex.qty+=qty;}else{S.billItems.push({name:name,qty:qty});}document.getElementById('item-search').value='';document.getElementById('item-qty').value='';renderBillItems();}
function remBillItem(idx){S.billItems.splice(idx,1);renderBillItems();}
function submitBill(){var g=S.godown;var bill=document.getElementById('txn-bill').value.trim();var type=document.getElementById('txn-type').value;var party=document.getElementById('txn-party').value.trim();var dt=nowStr();if(!bill){alert('Enter a bill number');return;}if(!S.billItems.length){alert('Add at least one item');return;}S.billItems.forEach(function(bi){var txn={id:Date.now()+Math.random(),type:type,bill:bill,item:bi.name,qty:bi.qty,party:party,datetime:dt,edited:false};g.txns.push(txn);sync({type:'transaction',godown:g.name,date:todayISO(),txn:txn});});document.getElementById('txn-bill').value='';document.getElementById('txn-party').value='';document.getElementById('txn-dt').value=nowStr();S.billItems=[];renderBillItems();renderSKTxns();renderSKClose();setSyncBar('ok','Bill submitted & synced ✓');}

function renderSKTxns(){var g=S.godown;var el=document.getElementById('sk-txn-list');if(!g.txns.length){el.innerHTML='<div class="empty">No transactions yet today</div>';return;}var grouped={};[].concat(g.txns).reverse().forEach(function(t){if(!grouped[t.bill])grouped[t.bill]={bill:t.bill,type:t.type,party:t.party,datetime:t.datetime,items:[]};grouped[t.bill].items.push(t);});el.innerHTML=Object.values(grouped).map(function(grp){return'<div class="trow"><div class="ttop"><div style="display:flex;align-items:center;gap:6px"><span class="badge '+grp.type+'">'+(grp.type==='in'?'Inward':'Outward')+'</span><span style="font-size:14px;font-weight:600">'+grp.bill+'</span></div><span style="font-size:12px;color:#73726c">'+grp.items.length+' item'+(grp.items.length>1?'s':'')+'</span></div><div class="tdet">'+(grp.party||'—')+' · '+grp.datetime+'</div>'+grp.items.map(function(t){return'<div style="display:flex;justify-content:space-between;padding:3px 0 3px 12px;font-size:13px;color:#73726c"><span>'+t.item+'</span><span style="font-weight:600">×'+t.qty+'</span></div>';}).join('')+'</div>';}).join('');}

function getNet(g,n){var s=g.opening[n]||0;g.txns.forEach(function(t){if(t.item===n)s+=t.type==='in'?t.qty:-t.qty;});return s;}
function buildSummary(g){return g.items.map(function(item){var o=g.opening[item.name]||0;var inw=g.txns.filter(function(t){return t.item===item.name&&t.type==='in';}).reduce(function(s,t){return s+t.qty;},0);var outw=g.txns.filter(function(t){return t.item===item.name&&t.type==='out';}).reduce(function(s,t){return s+t.qty;},0);var exp=o+inw-outw;var act=g.closing[item.name]||0;return{item:item.name,opening:o,inward:inw,outward:outw,expected:exp,actual:act,diff:act-exp};});}

// ── OWNER ─────────────────────────────────────────────────────────────────────
function initOwner(){document.getElementById('owner-date').textContent=todayStr();oTab('summary');goScreen('s-owner');}
function oTab(tab){['summary','txns','disc','adjust','settings'].forEach(function(t){document.getElementById('owner-'+t).style.display=t===tab?'block':'none';document.getElementById('ot-'+t).classList.toggle('active',t===tab);});if(tab==='summary')renderOSummary();if(tab==='txns')renderOTxns();if(tab==='disc')renderODisc();if(tab==='adjust')renderOAdjust();if(tab==='settings')renderOSettings();}

function renderOSummary(){var html='';DB.godowns.forEach(function(g){var ti=g.txns.filter(function(t){return t.type==='in';}).reduce(function(s,t){return s+t.qty;},0);var to=g.txns.filter(function(t){return t.type==='out';}).reduce(function(s,t){return s+t.qty;},0);var low=g.items.filter(function(item){return item.lowAlert&&getNet(g,item.name)<=item.lowAlert;});html+='<div class="card"><div style="font-size:15px;font-weight:700;margin-bottom:12px">'+g.name+(low.length?'<span class="lowbadge">⚠ '+low.length+' low</span>':'')+'</div><div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-bottom:12px"><div style="background:#f5f4f0;border-radius:10px;padding:.65rem .8rem"><div style="font-size:11px;color:#73726c">Transactions</div><div style="font-size:20px;font-weight:700">'+g.txns.length+'</div></div><div style="background:#f5f4f0;border-radius:10px;padding:.65rem .8rem"><div style="font-size:11px;color:#73726c">Inward</div><div style="font-size:20px;font-weight:700;color:#1D9E75">'+ti+'</div></div><div style="background:#f5f4f0;border-radius:10px;padding:.65rem .8rem"><div style="font-size:11px;color:#73726c">Outward</div><div style="font-size:20px;font-weight:700;color:#E24B4A">'+to+'</div></div><div style="background:#f5f4f0;border-radius:10px;padding:.65rem .8rem"><div style="font-size:11px;color:#73726c">Items</div><div style="font-size:20px;font-weight:700">'+g.items.length+'</div></div></div><div class="sec">Stock per item</div>'+g.items.map(function(item){var net=getNet(g,item.name);var lw=item.lowAlert&&net<=item.lowAlert;return'<div class="sline" style="'+(lw?'background:#FAEEDA;border-radius:10px;padding:5px 8px;':'')+'"><span style="flex:1;font-size:12px;'+(lw?'color:#633806;':'')+'">'+item.name+'</span><span style="font-size:12px;font-weight:600;'+(lw?'color:#633806;':'')+'">Net: '+net+' <span style="font-weight:400;color:#73726c">/ Close: '+(g.closing[item.name]!==undefined?g.closing[item.name]:'—')+'</span></span></div>';}).join('')+'</div>';});document.getElementById('owner-summary').innerHTML=html||'<div class="empty">No data yet</div>';}

function renderOTxns(){var html='';DB.godowns.forEach(function(g){if(!g.txns.length)return;var grouped={};[].concat(g.txns).reverse().forEach(function(t){if(!grouped[t.bill])grouped[t.bill]={bill:t.bill,type:t.type,party:t.party,datetime:t.datetime,items:[]};grouped[t.bill].items.push(t);});html+='<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:10px">'+g.name+'</div>'+Object.values(grouped).map(function(grp){return'<div class="trow"><div class="ttop"><div style="display:flex;gap:6px;align-items:center"><span class="badge '+grp.type+'">'+(grp.type==='in'?'Inward':'Outward')+'</span><span style="font-size:14px;font-weight:600">'+grp.bill+'</span></div><span style="font-size:12px;color:#73726c">'+grp.items.length+' items</span></div><div class="tdet">'+(grp.party||'—')+' · '+grp.datetime+'</div>'+grp.items.map(function(t){return'<div style="display:flex;justify-content:space-between;padding:2px 0 2px 10px;font-size:12px;color:#73726c"><span>'+t.item+'</span><span style="font-weight:600">×'+t.qty+'</span></div>';}).join('')+'</div>';}).join('')+'</div>';});document.getElementById('owner-txns').innerHTML=html||'<div class="empty">No transactions yet</div>';}

function renderODisc(){var html='';DB.godowns.forEach(function(g){html+='<div class="card"><div style="font-size:14px;font-weight:700;margin-bottom:10px">'+g.name+'</div>';g.items.forEach(function(item){var open=g.opening[item.name];var close=g.closing[item.name];if(open===undefined||close===undefined){html+='<div class="drow dpend">'+item.name+' — not yet complete</div>';return;}var exp=getNet(g,item.name);var diff=close-exp;html+=diff===0?'<div class="drow dok">✓ '+item.name+' — Matches ('+close+')</div>':'<div class="drow dwarn">⚠ '+item.name+' — Expected '+exp+', entered '+close+' <strong>(diff: '+(diff>0?'+':'')+diff+')</strong></div>';});html+='</div>';});document.getElementById('owner-disc').innerHTML=html;}

function renderOAdjust(){var opts=DB.godowns.map(function(g){return'<option value="'+g.id+'">'+g.name+'</option>';}).join('');document.getElementById('owner-adjust').innerHTML='<div class="card"><div class="sec">Manual stock adjustment</div><div class="fg"><label>Godown</label><select id="adj-gd" onchange="updAdjItems()">'+opts+'</select></div><div class="fg"><label>Item</label><select id="adj-item"></select></div><div class="fg"><label>Quantity (+ to add, − to remove)</label><input type="number" id="adj-qty" placeholder="e.g. -5 or 10" inputmode="numeric"></div><div class="fg"><label>Reason</label><input type="text" id="adj-reason" placeholder="e.g. Damaged goods, recount"></div><button class="btn wrn" onclick="applyAdj()">Apply adjustment</button></div>';updAdjItems();}
function updAdjItems(){var gid=document.getElementById('adj-gd').value;var g=DB.godowns.find(function(x){return x.id===gid;});document.getElementById('adj-item').innerHTML=g.items.map(function(i){return'<option>'+i.name+'</option>';}).join('');}
function applyAdj(){var gid=document.getElementById('adj-gd').value;var g=DB.godowns.find(function(x){return x.id===gid;});var item=document.getElementById('adj-item').value;var qty=parseInt(document.getElementById('adj-qty').value)||0;var reason=document.getElementById('adj-reason').value.trim();if(!qty){alert('Enter a non-zero quantity');return;}if(!reason){alert('Enter a reason');return;}var txn={id:Date.now(),type:qty>0?'in':'out',bill:'ADJ-'+Date.now().toString().slice(-4),item:item,qty:Math.abs(qty),party:'Owner: '+reason,datetime:nowStr(),edited:false};g.txns.push(txn);sync({type:'adjustment',godown:g.name,date:todayISO(),txn:txn}).then(function(){alert('Applied & synced to '+g.name);}).catch(function(){alert('Applied locally — sync failed');});}

// ── OWNER SETTINGS (all changes saved to Google Sheets immediately) ───────────
function renderOSettings(){
  var html='<div class="card"><div class="sec">🔐 Change PINs</div>'
    +'<div class="setrow"><span style="color:#73726c;font-size:13px">Owner PIN</span><button class="btn sm pri" onclick="changePin(\'owner\')">Change</button></div>'
    +DB.godowns.map(function(g){return'<div class="setrow"><span style="color:#73726c;font-size:13px">'+g.name+'</span><button class="btn sm" onclick="changePin(\''+g.id+'\')">Change PIN</button></div>';}).join('')
    +'</div><div class="card"><div class="sec">🏭 Rename godowns</div>'
    +DB.godowns.map(function(g){return'<div style="display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:0.5px solid rgba(0,0,0,0.07)"><input type="text" value="'+g.name+'" id="gname-'+g.id+'" style="flex:1;font-size:13px"><button class="btn sm suc" onclick="renameGodown(\''+g.id+'\')">✓ Save</button></div>';}).join('')
    +'<div class="sec" style="margin-top:14px">➕ Add new godown</div>'
    +'<div class="fg"><label>Godown name</label><input type="text" id="new-gd-name" placeholder="e.g. Godown D — South Depot"></div>'
    +'<div class="fg"><label>4-digit PIN</label><input type="number" id="new-gd-pin" placeholder="e.g. 3456" inputmode="numeric"></div>'
    +'<button class="btn suc" onclick="addGodown()">+ Add godown</button></div>'
    +DB.godowns.map(function(g){
      return'<div class="card"><div class="sec">📦 '+g.name+' — items</div><div id="items-'+g.id+'"></div>'
        +'<div style="display:flex;gap:6px;margin-top:10px"><input type="text" placeholder="New item name" id="newitem-'+g.id+'" style="flex:1;font-size:13px"><button class="btn sm suc" onclick="addItem(\''+g.id+'\')">+ Add</button></div></div>'
        +'<div class="card"><div class="sec">⚠ '+g.name+' — low stock alerts</div>'
        +g.items.map(function(item){return'<div class="sline"><span style="flex:1;font-size:12px">'+item.name+'</span><input type="number" min="0" placeholder="0=off" inputmode="numeric" id="alert-'+g.id+'-'+sid(item.name)+'" value="'+(item.lowAlert||'')+'" style="width:75px"><button class="btn sm" onclick="saveAlert(\''+g.id+'\',\''+item.name+'\')">✓</button></div>';}).join('')+'</div>';
    }).join('');
  document.getElementById('owner-settings').innerHTML=html;
  DB.godowns.forEach(function(g){renderItemList(g.id);});
}

function saveAndNotify(action){
  saveSettingsToSheets()
    .then(function(){ alert(action+' saved permanently to Google Sheets ✓'); })
    .catch(function(){ alert(action+' saved locally. Sync to Sheets failed — check internet.'); });
}

function renameGodown(gid){var g=DB.godowns.find(function(x){return x.id===gid;});var n=document.getElementById('gname-'+gid).value.trim();if(!n){alert('Enter a name');return;}g.name=n;renderGodownList();saveAndNotify('Godown renamed to "'+n+'"');}
function changePin(target){var np=prompt('Enter new 4-digit PIN:');if(!np||!/^\d{4}$/.test(np)){alert('Please enter exactly 4 digits');return;}if(target==='owner'){DB.ownerPin=np;}else{var g=DB.godowns.find(function(x){return x.id===target;});g.pin=np;}saveAndNotify('PIN updated');}
function addGodown(){var name=document.getElementById('new-gd-name').value.trim();var pin=document.getElementById('new-gd-pin').value.trim();if(!name){alert('Enter a godown name');return;}if(!/^\d{4}$/.test(pin)){alert('PIN must be exactly 4 digits');return;}if(DB.godowns.find(function(g){return g.pin===pin;})){alert('This PIN is already used. Choose a different one.');return;}var id='g'+Date.now();DB.godowns.push({id:id,name:name,pin:pin,items:[],txns:[],opening:{},closing:{},openSaved:false,closeSaved:false});document.getElementById('new-gd-name').value='';document.getElementById('new-gd-pin').value='';renderGodownList();renderOSettings();saveAndNotify('"'+name+'" added. PIN: '+pin);}

function renderItemList(gid){var g=DB.godowns.find(function(x){return x.id===gid;});var el=document.getElementById('items-'+gid);if(!el)return;el.innerHTML=g.items.map(function(item,idx){return'<div class="irow"><span style="flex:1" id="iname-'+gid+'-'+idx+'">'+item.name+'</span><button class="btn sm" onclick="startRename(\''+gid+'\','+idx+')" title="Rename">✎</button><button class="btn sm dan" onclick="delItem(\''+gid+'\','+idx+')" title="Delete">🗑</button></div>';}).join('')||'<div style="font-size:12px;color:#73726c">No items yet</div>';}
function startRename(gid,idx){var g=DB.godowns.find(function(x){return x.id===gid;});var el=document.getElementById('iname-'+gid+'-'+idx);el.innerHTML='<input type="text" value="'+g.items[idx].name+'" id="iren-'+gid+'-'+idx+'" style="width:130px;font-size:12px"><button class="btn sm suc" onclick="confirmRename(\''+gid+'\','+idx+')" style="margin-left:4px">✓</button>';}
function confirmRename(gid,idx){var g=DB.godowns.find(function(x){return x.id===gid;});var n=document.getElementById('iren-'+gid+'-'+idx).value.trim();if(!n){alert('Enter a name');return;}var old=g.items[idx].name;g.txns.forEach(function(t){if(t.item===old)t.item=n;});if(g.opening[old]!==undefined){g.opening[n]=g.opening[old];delete g.opening[old];}if(g.closing[old]!==undefined){g.closing[n]=g.closing[old];delete g.closing[old];}g.items[idx].name=n;renderItemList(gid);saveAndNotify('Item renamed to "'+n+'"');}
function delItem(gid,idx){var g=DB.godowns.find(function(x){return x.id===gid;});if(!confirm('Delete "'+g.items[idx].name+'"?'))return;g.items.splice(idx,1);renderItemList(gid);saveAndNotify('Item deleted');}
function addItem(gid){var g=DB.godowns.find(function(x){return x.id===gid;});var name=document.getElementById('newitem-'+gid).value.trim();if(!name){alert('Enter an item name');return;}if(g.items.find(function(i){return i.name===name;})){alert('Item already exists');return;}g.items.push({name:name,lowAlert:0});document.getElementById('newitem-'+gid).value='';renderItemList(gid);saveAndNotify('"'+name+'" added to '+g.name);}
function saveAlert(gid,itemName){var g=DB.godowns.find(function(x){return x.id===gid;});var item=g.items.find(function(i){return i.name===itemName;});var val=parseInt(document.getElementById('alert-'+gid+'-'+sid(itemName)).value)||0;item.lowAlert=val;saveAndNotify('Alert set: '+itemName+' → '+(val===0?'Off':val));}

function logout(){S.godown=null;S.role=null;S.pin='';S.billItems=[];renderGodownList();goScreen('s-login');}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadSettingsFromSheets();
</script>
</body>
</html>
